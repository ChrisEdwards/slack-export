# slack-export configuration
# Copy this file to slack-export.yaml and customize for your needs.
#
# Config file search order:
#   1. Path specified via --config flag
#   2. ./slack-export.yaml (current directory)
#   3. ~/.config/slack-export/slack-export.yaml
#
# Environment variables with SLACK_EXPORT_ prefix override file values.
# Example: SLACK_EXPORT_OUTPUT_DIR=/path/to/logs

# Directory where exported logs are written.
# Each channel gets a subdirectory with dated markdown files.
# Default: ./slack-logs
output_dir: ./slack-logs

# Timezone for date boundaries when splitting logs by day.
# Uses IANA timezone names (e.g., "America/New_York", "Europe/London", "UTC").
# Messages are grouped into daily files based on this timezone.
# Default: America/New_York
timezone: America/New_York

# Channel include patterns (glob syntax).
# Only channels matching at least one pattern are exported.
# If empty, all channels are included (subject to exclude patterns).
# Patterns are case-insensitive and support * and ? wildcards.
#
# Examples:
#   - "eng-*"      # All channels starting with "eng-"
#   - "*-team"     # All channels ending with "-team"
#   - "project-?"  # project-a, project-b, etc.
include:
  # - "eng-*"
  # - "ai-*"
  # - "_dm_*"

# Channel exclude patterns (glob syntax).
# Channels matching any pattern are skipped, even if they match include patterns.
# Useful for filtering out noisy automated channels.
#
# Examples:
#   - "*-deploys"  # Skip deployment notification channels
#   - "_app_*"     # Skip app/bot channels
#   - "*-alerts"   # Skip alert channels
exclude:
  # - "*-deploys"
  # - "_app_*"
  # - "*-alerts"

# Persistent slackdump v4 archive root.
# slack-export stores one database archive per workspace under this directory.
# Default: ~/.local/share/slack-export/archive
archive_dir: ~/.local/share/slack-export/archive

# First date covered by a newly bootstrapped archive.
# Empty means first sync uses the earliest existing dated output folder, or today
# when no output exists. Dates before the seed require reseeding the archive.
# Format: YYYY-MM-DD
seed_date: ""

# Resume lookback window. Recent files in this window can change on later syncs
# as edits and late thread replies arrive.
lookback: 7d

# Skip thread refreshes for threads idle longer than this duration during normal
# sync. Set to "" to disable. Periodic full sweeps ignore this setting.
skip_stale_threads: 21d

# Skip channel refreshes for channels idle longer than this duration during
# normal sync. Set to "" to disable. Periodic full sweeps ignore this setting.
skip_stale_channels: 21d

# Skip thread refreshes when the archive already has the parent plus Slack's
# reported reply count. Set to false to revisit complete threads for edits or
# deletes, at the cost of many more Slack API calls.
skip_complete_threads: true

# How often sync runs a full sweep without stale skipping.
# Set to "" to disable scheduled full sweeps.
full_sweep_interval: 7d
